name: Build and publish Goat images

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      profiles:
        description: "Comma-separated profiles to build (e.g. light,recon,full)"
        required: false
        default: "light,recon,full"
      push:
        description: "Push images to GHCR after build"
        required: false
        default: "true"
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: goatcommunity/goat

jobs:
  # ── Build light (fastest — no Go tools / cracking) ───────────────────────
  build-light:
    name: Build goat:light
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.profiles, 'light')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=light
            type=sha,prefix=light-

      - name: Build and push goat:light
        uses: docker/build-push-action@v5
        with:
          context: .
          file: light.dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:light
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TAG=light
            VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_PROFILE=light
          cache-from: type=gha,scope=light
          cache-to:   type=gha,scope=light,mode=max

  # ── Build recon ────────────────────────────────────────────────────────────
  build-recon:
    name: Build goat:recon
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.profiles, 'recon')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push goat:recon
        uses: docker/build-push-action@v5
        with:
          context: .
          file: recon.dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:recon
          build-args: |
            TAG=recon
            VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_PROFILE=recon
          cache-from: type=gha,scope=recon
          cache-to:   type=gha,scope=recon,mode=max

  # ── Build full (heaviest — metasploit, impacket, etc.) ────────────────────
  build-full:
    name: Build goat:full
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.profiles, 'full')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push goat:full
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:full
          build-args: |
            TAG=full
            VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_PROFILE=full
          cache-from: type=gha,scope=full
          cache-to:   type=gha,scope=full,mode=max
